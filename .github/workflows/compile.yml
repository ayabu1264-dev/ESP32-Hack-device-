name: Compile WifiX Pamungkas

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP32 Core
        # Karena di gambar lu pake ESP32, kita install core ESP32 resmi
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Libraries
        run: |
          arduino-cli lib install "ESPAsyncWebServer"
          arduino-cli lib install "AsyncTCP"
          arduino-cli lib install "ArduinoJson"

      - name: Fix Structure and Compile
        run: |
          # 1. Samakan nama folder dengan nama file .ino di gambar
          # Nama file di gambar: ESP32_Interactive_Hacking_Toolkit.ino
          mkdir -p ESP32_Interactive_Hacking_Toolkit
          
          # 2. Copy semua file ke folder tersebut
          cp -r ./* ESP32_Interactive_Hacking_Toolkit/ 2>/dev/null || true
          
          # 3. Jalankan Compile
          # Menggunakan FQBN standar ESP32 Dev Module
          arduino-cli compile --fqbn esp32:esp32:esp32 \
            --output-dir ./build \
            ./ESP32_Interactive_Hacking_Toolkit/ESP32_Interactive_Hacking_Toolkit.ino

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: WifiX-ESP32-Binary
          path: ./build/*.bin
